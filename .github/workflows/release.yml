name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Publish Pure Shell Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Windows Automated Test Suite
      run: powershell -ExecutionPolicy Bypass -File .\test.ps1

    - name: Package Universal Pure-Shell Archives
      run: |
        New-Item -ItemType Directory -Path ./release_pkg -Force | Out-Null
        Copy-Item pvm, pvm.ps1, pvm.cmd, install.sh, install.ps1, uninstall.sh, uninstall.ps1, README.md, LICENSE -Destination ./release_pkg/
        Compress-Archive -Path ./release_pkg/* -DestinationPath ./phpvm-universal.zip
        tar -czvf phpvm-universal.tar.gz -C ./release_pkg pvm pvm.ps1 pvm.cmd install.sh install.ps1 uninstall.sh uninstall.ps1 README.md LICENSE

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./phpvm-universal.zip
          ./phpvm-universal.tar.gz
          ./install.sh
          ./install.ps1
          ./pvm
          ./pvm.ps1
          ./pvm.cmd
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
