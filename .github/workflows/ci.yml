name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test-posix:
    name: Test POSIX Bash Engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run POSIX Bash Automated Test Suite
      run: bash ./test.sh

    - name: Verify CLI Commands
      run: |
        ./pvm --version
        ./pvm --help
        ./pvm list
        ./pvm current

  test-windows:
    name: Test Windows PowerShell & cmd Engine
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Windows PowerShell Automated Test Suite
      run: powershell -ExecutionPolicy Bypass -File .\test.ps1

    - name: Verify CLI Commands
      run: |
        powershell -ExecutionPolicy Bypass -Command ".\pvm.ps1 --version; .\pvm.ps1 --help; .\pvm.ps1 list; .\pvm.ps1 current"
        cmd /c pvm --version
